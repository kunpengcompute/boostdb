<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <g>
    <title>Layer 1</title>

    <!-- 背景 -->
    <rect id="bg" x="0" y="0" width="1600" height="1000" fill="#ffffff"/>

    <!-- 四周边框 -->
    <line id="border_top" x1="2" y1="2" x2="1598" y2="2" stroke="rgb(219, 219, 216)" stroke-width="2"/>
    <line id="border_right" x1="1598" y1="2" x2="1598" y2="998" stroke="rgb(219, 219, 216)" stroke-width="2"/>
    <line id="border_bottom" x1="2" y1="998" x2="1598" y2="998" stroke="rgb(219, 219, 216)" stroke-width="2"/>
    <line id="border_left" x1="2" y1="2" x2="2" y2="998" stroke="rgb(219, 219, 216)" stroke-width="2"/>

    <!-- 标题 -->
    <text
      id="title"
      transform="matrix(1.08659 0 0 1.08659 -46.2939 -7.56289)"
      x="798.23977"
      y="80"
      fill="#333333"
      font-size="28px"
      font-family="Microsoft YaHei, PingFang SC, sans-serif"
      text-anchor="middle">
      MySQL Plan Cache特性优化前后性能对比
    </text>

    <!-- 网格线 -->
    <line x1="300" y1="900" x2="1400" y2="900" stroke="rgb(129, 134, 140)" stroke-width="2"/>
    <line x1="300" y1="760" x2="1400" y2="760" stroke="rgb(129, 134, 140)" stroke-width="2"/>
    <line x1="300" y1="620" x2="1400" y2="620" stroke="rgb(129, 134, 140)" stroke-width="2"/>
    <line x1="300" y1="480" x2="1400" y2="480" stroke="rgb(129, 134, 140)" stroke-width="2"/>
    <line x1="300" y1="340" x2="1400" y2="340" stroke="rgb(129, 134, 140)" stroke-width="2"/>
    <line x1="300" y1="200" x2="1400" y2="200" stroke="rgb(129, 134, 140)" stroke-width="2"/>

    <!-- Y轴刻度 -->
    <text x="260" y="907" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">0</text>
    <text x="260" y="767" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">0.25</text>
    <text x="260" y="627" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">0.5</text>
    <text x="260" y="487" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">0.75</text>
    <text x="260" y="347" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">1</text>
    <text x="260" y="207" fill="#666666" font-size="20px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="end">1.25</text>

    <!-- 柱子 -->
    <rect id="bar_before" x="575" y="340" width="100" height="560" fill="#C1D3FE"/>
    <path id="bar_after" d="M925,284 L1025,284 L1025,900 L925,900 Z" fill="#5478F6" opacity="1"/>

    <!-- 柱顶数值 -->
    <text x="625" y="320" fill="#333333" font-size="22px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="middle">1</text>
    <text x="975" y="264" fill="#333333" font-size="22px" font-family="Microsoft YaHei, PingFang SC, sans-serif" text-anchor="middle">1.1</text>

    <!-- 图例 -->
    <rect x="568" y="918" width="39" height="30" fill="#C1D3FE"/>
    <text
      transform="matrix(1.54754 0 0 1.54754 -342.762 -516.847)"
      x="625.35381"
      y="941.82453"
      fill="#333333"
      font-size="16px"
      font-family="Microsoft YaHei, PingFang SC, sans-serif">
      优化前
    </text>

    <rect x="916" y="918" width="39" height="30" fill="#5478F6"/>
    <text
      transform="matrix(1.54754 0 0 1.54754 -342.762 -516.847)"
      x="850.22776"
      y="942.58474"
      fill="#333333"
      font-size="16px"
      font-family="Microsoft YaHei, PingFang SC, sans-serif">
      优化后
    </text>
  </g>
</svg>